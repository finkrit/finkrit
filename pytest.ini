[pytest]
# Sources live under packages/ and services/api/. Put those on the import path
# so a fresh clone resolves finkritq, finagent, finkritintel, and finkritserver
# with no manual .pth or PYTHONPATH, and collect the tests from there.
pythonpath = packages services/api
testpaths = packages services/api
norecursedirs =
    .finkritvenv
    .git
    __pycache__
    node_modules
